<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto Auténtico</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

/* Pantalla inicial */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: 
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
    url('FONDO_AMBAKITI.png') repeat center;
  background-size: 400px;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#splash img {
  width: 250px;
  animation: zoom 3s ease forwards;
}

@keyframes zoom {
  0% {transform: scale(0.7); opacity: 0;}
  50% {transform: scale(1.2); opacity: 1;}
  100% {transform: scale(1); opacity: 1;}
}

/* Contenido principal */
#main {
  opacity: 0;
  transition: opacity 1.5s ease;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Tarjeta */
.card {
  background: 
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
    url('FONDO_AMBAKITI.png') repeat center;
  background-size: 400px;
  color: #fff;
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  width: 320px;
  box-shadow: 0 0 40px rgba(255,255,255,0.1);
}

.card h1 {
  font-size: 24px;
  margin-bottom: 10px;
}

.card p {
  font-size: 14px;
  color: #ccc;
}

/* Botones */
.btn {
  display: block;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  background: linear-gradient(90deg, #111, #333);
  transition: 0.3s;
}

.btn:hover {
  background: linear-gradient(90deg, #444, #777);
}

/* Animación entrada */
.show {
  opacity: 1 !important;
}
</style>
</head>

<body>

<!-- Imagen inicial -->
<div id="splash">
  <img src="C:\Users\og\OneDrive\Escritorio\qq.png" alt="Logo">
</div>

<!-- Contenido -->
<div id="main">
  <div class="card">
    <h1>Producto Auténtico</h1>
    <p>Hecho a mano con pasión y precisión. 
Este Bajoquinto es un producto auténtico ahora forma parte de la familia Ambakiti. 
Gracias por confiar en nuestra calidad..</p>

    <a href="https://www.instagram.com/ambakiti_bajoquintosoficial/" class="btn">Instagram</a>
    <a href="tel:+52 4521775540" class="btn">Llamar</a>
  </div>
</div>

<script>
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("main").classList.add("show");
}, 3000);
</script>

</body>
</html>
